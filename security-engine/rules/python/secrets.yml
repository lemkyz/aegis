rules:
  - id: aegis.python.secrets.hardcoded-password
    languages:
      - python
    severity: ERROR
    message: >-
      A password appears to be hardcoded in source code. Store credentials
      in an environment variable or an approved secret manager.
    metadata:
      cwe:
        - CWE-798
      owasp:
        - A07:2021
      category: secrets
      technology:
        - python
    pattern-regex: >-
      (?im)^\s*(?:password|passwd|pwd|db_password|database_password)\s*=\s*["'][^"'\n]{8,}["']

  - id: aegis.python.secrets.generic-api-key
    languages:
      - python
    severity: ERROR
    message: >-
      An API key or access token appears to be hardcoded in source code.
      Load it from an environment variable or secret manager instead.
    metadata:
      cwe:
        - CWE-798
      owasp:
        - A02:2021
      category: secrets
      technology:
        - python
    pattern-regex: >-
      (?im)^\s*(?:api_key|apikey|access_token|auth_token|secret_key)\s*=\s*["'][A-Za-z0-9_\-./+=]{16,}["']

  - id: aegis.python.secrets.aws-access-key
    languages:
      - python
    severity: ERROR
    message: >-
      An AWS access key identifier appears to be embedded in source code.
      Revoke exposed credentials and use an IAM role or secret manager.
    metadata:
      cwe:
        - CWE-798
      owasp:
        - A02:2021
      category: secrets
      technology:
        - aws
        - python
    pattern-regex: >-
      \b(?:AKIA|ASIA)[A-Z0-9]{16}\b

  - id: aegis.python.secrets.github-token
    languages:
      - python
    severity: ERROR
    message: >-
      A GitHub token appears to be embedded in source code. Revoke the token
      and load a replacement from a protected environment variable.
    metadata:
      cwe:
        - CWE-798
      owasp:
        - A02:2021
      category: secrets
      technology:
        - github
        - python
    pattern-regex: >-
      \b(?:ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{30,})\b

  - id: aegis.python.secrets.private-key
    languages:
      - python
    severity: ERROR
    message: >-
      Private key material appears to be embedded in source code. Remove it
      from the repository, rotate the key, and store it in a secret manager.
    metadata:
      cwe:
        - CWE-321
      owasp:
        - A02:2021
      category: secrets
      technology:
        - cryptography
        - python
    pattern-regex: >-
      -----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----

  - id: aegis.python.secrets.database-url-with-credentials
    languages:
      - python
    severity: ERROR
    message: >-
      A database connection URL contains embedded credentials. Store the
      username and password outside source code and rotate exposed secrets.
    metadata:
      cwe:
        - CWE-798
      owasp:
        - A02:2021
      category: secrets
      technology:
        - database
        - python
    pattern-regex: >-
      (?i)\b(?:postgres(?:ql)?|mysql|mongodb(?:\+srv)?):\/\/[^:\s"'\/]+:[^@\s"']+@

  - id: aegis.python.secrets.jwt-secret
    languages:
      - python
    severity: ERROR
    message: >-
      A JWT signing secret appears to be hardcoded. Load signing material
      from a protected environment variable or key-management service.
    metadata:
      cwe:
        - CWE-321
      owasp:
        - A02:2021
      category: secrets
      technology:
        - jwt
        - python
    pattern-regex: >-
      (?im)^\s*(?:jwt_secret|jwt_signing_key|signing_secret)\s*=\s*["'][^"'\n]{12,}["']
